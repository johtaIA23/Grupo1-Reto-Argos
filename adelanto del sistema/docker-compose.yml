# ============================================================
# n8n Self-Hosted para el sistema de censo de ferreterías
#
# INSTRUCCIONES:
#   1. Copia .env.example → .env y rellena las variables
#   2. Crea la carpeta: mkdir -p n8n_data data
#   3. Copia el CSV a: ./data/ferreterias.csv
#   4. Levanta n8n: docker-compose up -d
#   5. Abre el navegador en: http://localhost:5678
# ============================================================

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      # Datos persistentes de n8n (workflows, credenciales, etc.)
      - ./n8n_data:/home/node/.n8n
      # Carpeta donde debes colocar el CSV
      # Dentro del contenedor se accede como /data/ferreterias.csv
      - ./data:/data
    environment:
      # --- Seguridad ---
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}

      # --- Acceso web ---
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/

      # --- Permisos para Code nodes (necesario para this.helpers.httpRequest y process.env) ---
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - N8N_RUNNERS_ENABLED=false
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_RESTRICT_FILE_ACCESS_TO=/data:/home/node/.n8n-files

      # --- Timeout extendido para workflows largos (48k registros) ---
      # 4 horas en segundos
      - EXECUTIONS_TIMEOUT=14400
      - EXECUTIONS_TIMEOUT_MAX=14400

      # --- Variables de entorno expuestas a los Code nodes ---
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}

      # --- Base de datos interna de n8n (SQLite por defecto, suficiente para este uso) ---
      - DB_TYPE=sqlite
      - DB_SQLITE_DATABASE=/home/node/.n8n/database.sqlite

      # --- Logs ---
      - N8N_LOG_LEVEL=info
    networks:
      - ferreterias-net

  # ============================================================
  # Python API — FastAPI + pandas
  # Procesa el CSV, clasifica registros y sirve al AI Agent
  # Accesible desde n8n como: http://python-api:8000
  # ============================================================
  python-api:
    build:
      context: ./python-api
      dockerfile: Dockerfile
    image: ferreterias-python-api:latest
    restart: unless-stopped
    # Para probar desde el navegador, descomenta las 2 líneas siguientes:
    ports:
      - "8000:8000"
    volumes:
      # Misma carpeta data que n8n — solo lectura para el Python API
      - ./data:/data:ro
      # Hot-reload: cambios en el código Python y templates se reflejan sin rebuild
      - ./python-api/app:/app/app
    environment:
      - CSV_PATH=/data/ferreterias.csv
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_SERVICE_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - ferreterias-net

networks:
  ferreterias-net:
    driver: bridge
