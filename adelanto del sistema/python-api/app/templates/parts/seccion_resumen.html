<!-- ═══════════════════════════════════════════════════════
     SECCIÓN: RESUMEN — Estadísticas y gráficas del censo
     ═══════════════════════════════════════════════════════ -->
<div data-section="resumen" class="active space-y-6">

  <!-- Tarjetas de métricas -->
  <div class="grid grid-cols-2 xl:grid-cols-4 gap-4">

    <div class="stat-card bg-white rounded-xl p-5 shadow-sm border border-gray-100">
      <p class="text-xs font-medium text-gray-500 uppercase tracking-wide">Ferreterías totales</p>
      <p class="text-3xl font-bold text-navy mt-1" id="stat-total">—</p>
      <p class="text-xs text-gray-400 mt-1">en base de datos</p>
    </div>

    <div class="stat-card bg-white rounded-xl p-5 shadow-sm border border-gray-100">
      <p class="text-xs font-medium text-gray-500 uppercase tracking-wide">Información Completa</p>
      <p class="text-3xl font-bold text-green-600 mt-1" id="stat-completa">—</p>
      <p class="text-xs text-gray-400 mt-1" id="stat-completa-pct">con nombre, dirección y tel.</p>
    </div>

    <div class="stat-card bg-white rounded-xl p-5 shadow-sm border border-gray-100">
      <p class="text-xs font-medium text-gray-500 uppercase tracking-wide">Legalmente Constituidas</p>
      <p class="text-3xl font-bold text-blue-600 mt-1" id="stat-legal">—</p>
      <p class="text-xs text-gray-400 mt-1" id="stat-legal-pct">con NIT o matrícula activa</p>
    </div>

    <div class="stat-card bg-white rounded-xl p-5 shadow-sm border border-gray-100">
      <p class="text-xs font-medium text-gray-500 uppercase tracking-wide">Con Teléfono</p>
      <p class="text-3xl font-bold text-accent mt-1" id="stat-telefono">—</p>
      <p class="text-xs text-gray-400 mt-1" id="stat-telefono-pct">contacto disponible</p>
    </div>

  </div>

  <!-- Gráficas -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">

    <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
      <p class="text-sm font-semibold text-gray-700 mb-4">Estado de Información</p>
      <div class="relative h-52"><canvas id="chart-info"></canvas></div>
    </div>

    <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
      <p class="text-sm font-semibold text-gray-700 mb-4">Estado Legal</p>
      <div class="relative h-52"><canvas id="chart-legal"></canvas></div>
    </div>

    <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
      <p class="text-sm font-semibold text-gray-700 mb-4">Top Departamentos</p>
      <div class="relative h-52"><canvas id="chart-dep"></canvas></div>
    </div>

  </div>

  <!-- Tags de cámaras de comercio -->
  <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
    <p class="text-sm font-semibold text-gray-700 mb-3">Top Ciudades de Cámaras de Comercio</p>
    <div id="camaras-list" class="flex flex-wrap gap-2"></div>
  </div>

</div>
